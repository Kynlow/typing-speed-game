<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Typing-speed-game</title>
        <link rel="stylesheet" href="css/reset.css" />
        <link rel="stylesheet" href="css/normalize.css" />
        <link rel="stylesheet" href="css/main.css" />
        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <header>
            <div class="logo"></div>
            <article class="best">
                <svg
                    width="21"
                    height="18"
                    viewBox="0 0 21 18"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                >
                    <path
                        d="M19.4062 2.25C19.8633 2.25 20.25 2.63672 20.25 3.09375V5.0625C20.25 6.32812 19.4414 7.62891 18.0703 8.61328C16.9453 9.42188 15.6094 9.91406 14.2031 10.0898C13.0781 11.918 11.8125 12.6562 11.8125 12.6562V15.1875H13.5C14.7305 15.1875 15.75 15.9258 15.75 17.1562V17.5781C15.75 17.8242 15.5391 18 15.3281 18H4.92188C4.67578 18 4.5 17.8242 4.5 17.5781V17.1562C4.5 15.9258 5.48438 15.1875 6.75 15.1875H8.4375V12.6562C8.4375 12.6562 7.13672 11.918 6.01172 10.0898C4.60547 9.91406 3.26953 9.42188 2.14453 8.61328C0.773438 7.62891 0 6.32812 0 5.0625V3.09375C0 2.63672 0.351562 2.25 0.84375 2.25H4.5V0.84375C4.5 0.386719 4.85156 0 5.34375 0H14.9062C15.3633 0 15.75 0.386719 15.75 0.84375V2.25H19.4062ZM3.48047 6.78516C3.90234 7.10156 4.39453 7.34766 4.95703 7.55859C4.71094 6.67969 4.53516 5.66016 4.5 4.5H2.25V5.0625C2.25 5.48438 2.60156 6.1875 3.48047 6.78516ZM18 5.0625V4.5H15.7148C15.6797 5.66016 15.5039 6.67969 15.2578 7.55859C15.8203 7.34766 16.3125 7.10156 16.7344 6.78516C17.3672 6.36328 18 5.66016 18 5.0625Z"
                        fill="#f4dc73"
                    />
                </svg>
                <p>Best: <span id="bestdata">00 WPM</span></p>
            </article>
        </header>
        <main>
            <section class="datas">
                <article class="scores">
                    <div class="scores-col">
                        <p>WPM:</p>
                        <h2 id="wpm">0</h2>
                    </div>
                    <hr />
                    <div class="scores-col">
                        <p>Accuracy:</p>
                        <h2 id="accu">100 %</h2>
                    </div>
                    <hr />
                    <div class="scores-col">
                        <p>Time:</p>
                        <h2 id="timer">0:60</h2>
                    </div>
                </article>
                <article class="difficulty">
                    <p>Difficulty:</p>
                    <div class="difficulty-radios">
                        <input
                            type="radio"
                            id="easy"
                            name="radios"
                            checked
                            value="easy"
                        />

                        <input
                            type="radio"
                            id="medium"
                            name="radios"
                            value="medium"
                        />

                        <input
                            type="radio"
                            id="hard"
                            name="radios"
                            value="hard"
                        />
                    </div>
                </article>
            </section>
            <section class="typing-section">
                <dialog open id="dialog1">
                    <article class="article-dialog">
                        <button class="article-dialog-button" id="start">
                            Start Typing Test
                        </button>
                        <p class="article-dialog-p">
                            Or click the text and start typing
                        </p>
                    </article>
                </dialog>
                <div id="backDiv" class="placeholder">
                    <span id="spanRemove"
                        >The archaeological expedition unearthed artifacts that
                        complicated prevailing theories about Bronze Age trade
                        networks. Obsidian from Anatolia, lapis lazuli from
                        Afghanistan,</span
                    >

                    <div id="textarea" contenteditable="true"></div>
                </div>
            </section>
        </main>
        <script src="app.js"></script>
    </body>
</html>
